<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Firewind Showcase</title>
        <base href="/" />

        <link rel="preload" id="webassembly" />
        <link rel="stylesheet" href="_content/Firewind/Firewind.css" asp-append-version="true" />
        <link rel="stylesheet" href="/css/showcase.css" asp-append-version="true" />
        <link rel="icon" type="image/png" href="favicon.png" />
        <link href="Firewind.Showcase.styles.css" rel="stylesheet" />
        <script type="importmap"></script>
    </head>

    <body class="bg-gray-100">
        <div id="app" class="min-h-screen flex flex-col">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>

        <div id="blazor-error-ui">
            An unhandled error has occurred.
            <a href="." class="reload">Reload</a>
            <span class="dismiss">🗙</span>
        </div>
        <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    </body>
</html>
