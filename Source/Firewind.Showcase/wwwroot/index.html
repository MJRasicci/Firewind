<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firewind Showcase</title>
  <base href="/" />

  <link rel="preload" id="webassembly" />

  <link rel="stylesheet" href="/css/showcase.css" asp-append-version="true" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <script type="importmap"></script>
</head>

<body>
  <div class="min-h-screen flex flex-col" id="app">
    <div class="fixed inset-x-0 top-1/2 -translate-y-1/2 flex justify-center">
      <span class="fw-loading fw-loading-spinner fw-loading-xl text-primary"></span>
    </div>
  </div>

  <div id="blazor-error-ui" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-[1000] hidden box-border px-5 py-2.5 shadow-md max-w-xl w-[calc(100%-2rem)]">
    <div role="alert" class="fw-alert fw-alert-error fw-alert-vertical sm:fw-alert-horizontal">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div>
        <h3 class="font-bold">Error!</h3>
        <div class="text-xs">An unhandled error has occurred. We recommend reloading the page to restore a stable application state.</div>
      </div>
      <div>
        <a href="." class="fw-btn fw-btn-sm fw-btn-neutral dismiss">Dismiss</a>
        <a href="." class="fw-btn fw-btn-sm fw-btn-success reload">Reload</a>
      </div>
    </div>
  </div>

  <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
